<!DOCTYPE html>
<html dir="ltr" lang="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>product-gallery-slider</title>
    <link rel="icon" type="image/png" href="./assets/media/images/logo-web3.webp">
    <!--  -->
    <base href="../../../../">
    <link rel="stylesheet" href="./assets/vendors/swiper/swiper-bundle-min.css">
    <link rel="stylesheet" href="./assets/icons/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="./assets/icons/icomoon/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/miz.min.css">
    <link rel="stylesheet" href="./assets/css/style.min.css">
</head>

<body class="font-en-primary">
<div class="d-grid grid-4">
       <div class="product-gallery slider">
    <div class="slider-wrapper slider-loop">
        <div class="slider-container">
                <div id="slider-0" class="slider-content">
                    <img src="./assets/media/images/en/products/mobile-1.webp" alt="">
                </div>
                <div id="slider-1" class="slider-content">
                    <img src="./assets/media/images/en/products/mobile-2.webp" alt="">
                </div>
                <div id="slider-2" class="slider-content">
                    <img src="./assets/media/images/en/products/mobile-3.webp" alt="">
                </div>
        </div>
    </div>
    <div class="slider-toggles">
            <img class="slider-toggle" data-slider-id="slider-0" src="./assets/media/images/en/products/mobile-1.webp" alt="">
            <img class="slider-toggle" data-slider-id="slider-1" src="./assets/media/images/en/products/mobile-2.webp" alt="">
            <img class="slider-toggle" data-slider-id="slider-2" src="./assets/media/images/en/products/mobile-3.webp" alt="">
    </div>
</div>     
</div>

    <script src="./assets/vendors/swiper/swiper-bundle-min.js"></script>
    <script src="./assets/js/mizchin.min.js"></script>
</body>

</html>
