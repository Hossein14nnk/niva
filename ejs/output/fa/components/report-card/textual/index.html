<!DOCTYPE html>
<html dir="rtl" lang="fa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reort-card</title>
    <link rel="icon" type="image/png" href="./assets/media/images/logo-web3.webp">
    <base href="../../../../../">
    <link rel="stylesheet" href="./assets/vendors/swiper/swiper-bundle-min.css">
    <link rel="stylesheet" href="./assets/icons/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="./assets/icons/icomoon/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/miz.min.css">
    <link rel="stylesheet" href="./assets/css/style.min.css">
</head>

<body class="font-fa-primary">
<div class="d-grid grid-4">
       
  <div class="report-product">
    <div class="d-flex flex-row align-content-center justify-content-space-between pb-4">
      <span class="txt-size-title font-weight-bold">گزارش قیمت پایین تر</span>

      <i class="fa-regular fa-close secondary-light-color"></i>
    </div>

    <div class="d-flex flex-column gap-1">
      <div>
        <label for="one" class="txt-size-big font-weight-medium">لینک یا آدرس فروشگاه</label>
        <input type="text" id="one" class="w-100 py-2 outline-unset bg-secondary-color radius-all-small border-b-none border-l-none border-r-none border-t-none">
      </div>

      <div>
        <label for="two" class="txt-size-big font-weight-medium">قیمت محصول</label>
        <input type="text" id="two" class="w-100 py-2 outline-unset bg-secondary-color radius-all-small border-b-none border-l-none border-r-none border-t-none">
      </div>
    </div>

    <button type="submit" class="w-100 py-3 bg-button-color button-text-color radius-all-small bg-btn-hover font-weight-medium">گزارش قیمت بهتر</button>
  </div>
</div>

    <script src="./assets/vendors/swiper/swiper-bundle-min.js"></script>
    <script src="./assets/js/mizchin.min.js"></script>
</body>

</html>
